<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - StudyPlan Hub</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="brand">StudyPlan Hub</div>
      <nav>
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="create-edit.html">Create Plan</a>
        <button id="logoutButton" class="button button-secondary">Logout</button>
      </nav>
    </header>

    <main class="page-shell">
      <section class="card profile-card">
        <h1>My Profile</h1>
        <div id="profileInfo"></div>
      </section>
      <section class="card">
        <h2>Created Plans</h2>
        <div id="createdPlans" class="grid"></div>
      </section>
      <section class="card">
        <h2>Followed Plans</h2>
        <div id="followedPlans" class="grid"></div>
      </section>
      <div id="dashboardMessage" class="message"></div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
