<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - StudyPlan Hub</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body data-page="register">
    <nav class="navbar">
      <div class="container">
        <div class="navbar-brand">
          <a href="/">📚 StudyPlan Hub</a>
        </div>
        <div class="navbar-menu" id="navMenu">
          <a href="/" class="navbar-item">Home</a>
          <a href="./login.html" class="navbar-item">Login</a>
          <a href="./register.html" class="navbar-item active">Register</a>
        </div>
      </div>
    </nav>

    <main class="container">
      <div class="auth-page">
        <div class="auth-card">
          <h1>Get Started</h1>
          <p class="auth-subtitle">Create an account to start your learning journey</p>

          <div class="message"></div>

          <form id="registerForm" class="auth-form">
            <div class="form-group">
              <label for="name">Full Name</label>
              <input
                type="text"
                id="name"
                name="name"
                placeholder="Enter your full name"
                required
              />
            </div>

            <div class="form-group">
              <label for="email">Email</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="your@email.com"
                required
              />
            </div>

            <div class="form-group">
              <label for="password">Password</label>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="••••••••"
                required
              />
            </div>

            <div class="form-group">
              <label for="confirmPassword">Confirm Password</label>
              <input
                type="password"
                id="confirmPassword"
                name="confirmPassword"
                placeholder="••••••••"
                required
              />
            </div>

            <button type="submit" class="btn btn-primary btn-block">
              Create Account
            </button>
          </form>

          <div class="auth-footer">
            <p>
              Already have an account?
              <a href="./login.html">Login here</a>
            </p>
          </div>
        </div>
      </div>
    </main>

    <script src="../js/api.js"></script>
    <script src="../js/app.js"></script>
  </body>
</html>
