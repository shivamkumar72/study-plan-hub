<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - StudyPlan Hub</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body data-page="dashboard">
    <nav class="navbar">
      <div class="container">
        <div class="navbar-brand">
          <a href="/">📚 StudyPlan Hub</a>
        </div>
        <div class="navbar-menu" id="navMenu">
          <a href="/" class="navbar-item">Home</a>
          <a href="./login.html" class="navbar-item">Login</a>
          <a href="./register.html" class="navbar-item">Register</a>
        </div>
        <div class="navbar-actions" id="navActions" style="display: none">
          <a href="./dashboard.html" class="navbar-item active">Dashboard</a>
          <a href="./create-plan.html" class="navbar-item">Create Plan</a>
          <button id="logoutBtn" class="btn btn-secondary">Logout</button>
        </div>
      </div>
    </nav>

    <main class="container">
      <div class="message"></div>

      <div class="dashboard-header">
        <h1>Your Dashboard</h1>
        <a href="./create-plan.html" class="btn btn-primary">+ Create New Plan</a>
      </div>

      <div class="dashboard-content">
        <!-- Profile Section -->
        <section class="dashboard-section">
          <h2>Profile Information</h2>
          <div id="profileInfo" class="loading">
            Loading profile...
          </div>
        </section>

        <!-- Created Plans Section -->
        <section class="dashboard-section">
          <h2>Plans You Created</h2>
          <div id="createdPlans" class="plans-grid loading">
            Loading your plans...
          </div>
        </section>

        <!-- Followed Plans Section -->
        <section class="dashboard-section">
          <h2>Plans You're Following</h2>
          <div id="followedPlans" class="plans-grid loading">
            Loading your followed plans...
          </div>
        </section>
      </div>
    </main>

    <script src="../js/api.js"></script>
    <script src="../js/app.js"></script>
  </body>
</html>
